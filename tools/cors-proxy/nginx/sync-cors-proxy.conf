# Example nginx config: reverse-proxy a self-hosted anki-sync-server and add
# the CORS headers it doesn't send itself (see ../README.md for why this is
# needed at all — it's not specific to nginx vs. the Node proxy in this
# directory, pick whichever you're more comfortable running).
#
# IMPORTANT: TLS/HTTPS and CORS are unrelated. Terminating TLS here (or via
# anki-sync-server-enhanced's own TLS_ENABLED option) does NOT by itself fix
# the CORS error — the "Access-Control-Allow-*" headers below are what fix
# it, independent of http vs https. This config does both because nginx is
# already in the request path either way, not because they're the same fix.
#
# Usage:
#   1. Edit `upstream_sync_server` below to point at your real server
#      (e.g. http://192.168.178.4:8081, the sync-server port from
#      anki-sync-server-enhanced, NOT its 8080/dashboard/metrics ports).
#   2. Point this at nginx however you normally run it (a standalone
#      nginx install, or another container in the same compose file as
#      anki-sync-server-enhanced with this file mounted into
#      /etc/nginx/conf.d/).
#   3. In CleanAnki's Sync tab, use this proxy's own address (e.g.
#      http://localhost:8082, or https://<this-host>:8443 if you enable the
#      commented-out TLS block) as the "custom sync server" — not the real
#      server's address directly.

# Plain HTTP variant (fine for local/dev use — same trust model as running
# the Node proxy from ../proxy.mjs on localhost). Uncomment the `listen 443
# ssl` block below instead (and fill in ssl_certificate/ssl_certificate_key)
# if you want TLS too, e.g. for a non-localhost deployment.
server {
    listen 8082;
    server_name _;

    # listen 8443 ssl;
    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    set $upstream_sync_server http://192.168.178.4:8081;

    location / {
        # Preflight: the browser sends this before the real request whenever
        # it's a "non-simple" request (our sync client's custom `anki-sync`
        # header and `application/octet-stream` content type both qualify).
        # Answer it directly rather than forwarding it upstream.
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        # Reflecting the request's own Origin (rather than a fixed value)
        # means this works regardless of what host/port CleanAnki is served
        # from.
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;

        proxy_pass $upstream_sync_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # The sync protocol's request/response bodies are already
        # zstd-compressed by the client — don't let nginx re-encode them.
        proxy_set_header Accept-Encoding "";
    }
}
